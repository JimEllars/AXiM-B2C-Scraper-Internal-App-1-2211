name = "axim-b2c-scraper-node"
main = "src/index.js"
compatibility_date = "2024-07-06"
workers_dev = false

# Phase II: State Management Ledger Binding
[[kv_namespaces]]
binding = "B2C_SCRAPER_STATE"
id = "db43428b35d648b5975bcf4faff6d9ef"
preview_id = "db43428b35d648b5975bcf4faff6d9ef"

# Plaintext Environment Variables
[vars]
ENVIRONMENT = "production"
FRONTEND_URL = ""
ENRICHMENT_BRIDGE_URL = "https://api.axim.us.com/v1/webhooks/enrich"
TELEMETRY_ENDPOINT = "https://api.axim.us.com/v1/telemetry/collect"
TARGET_BATCH_SIZE = "100"
MAX_EXECUTION_TIME_MS = "25000"
DEFAULT_CRON_TARGET_URL = "https://example.com/target"

# INSTRUCTIONS FOR SENSITIVE SECRETS:
# Do NOT hardcode sensitive API keys or tokens in this file.
# Use the `wrangler secret put <KEY_NAME>` command to set the following:
# - PROXY_PROVIDER_KEY: External proxy API key (e.g., ScraperAPI)
# - AXIM_INTERNAL_KEY: Internal key for Bridge and Telemetry access
# - DASHBOARD_ACCESS_TOKEN: Token to authenticate node access requests

# Phase III: Autonomous Execution Schedule (Cron Triggers)
[triggers]
# Runs at minute 0 past every 4th hour (e.g., 00:00, 04:00, 08:00...)
crons = ["0 */4 * * *"]
